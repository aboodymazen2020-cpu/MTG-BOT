<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>بو قحط|MTG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- طبقة الظلام (شكل فقط) -->
<div class="overlay"></div>

<!-- المحتوى -->
<div class="container">
  <h1>🔥 بو قحط 🔥</h1>
  <p class="desc">• رسائل نشر الشات العام الخاص بي ابو قحط</p>

  <input id="title" type="text" placeholder="عنوان الرسالة">
  <textarea id="message" placeholder="اكتب الرسالة هنا..."></textarea>

  <button onclick="send()">إرسال إلى الديسكورد</button>

  <p class="status" id="status"></p>
</div>

<script src="script.js"></script>
</body>
</html>
