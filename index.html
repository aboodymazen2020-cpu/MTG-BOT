<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>MTG PANEL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1 class="glitch" data-text="MTG">MTG</h1>
  <p class="subtitle">Cyber Control Panel</p>

  <div class="card">

    <input id="name" placeholder="الاسم">
    <input id="job" placeholder="المسؤولية">

    <select id="type">
      <option value="تعيين">تعيين</option>
      <option value="إعفاء">إعفاء</option>
    </select>

    <select id="mention">
      <option value="none">❌ بدون منشن</option>
      <option value="everyone">👥 everyone</option>
      <option value="role">🎭 رول</option>
    </select>

    <input id="roleId" placeholder="Role ID (في حال اختيار رول)">

    <textarea id="message" placeholder="اكتب الرسالة هنا"></textarea>

    <button onclick="send()">إرسال</button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
