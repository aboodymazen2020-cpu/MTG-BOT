<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>بو قحط|MTG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- نار -->
<div class="fire"></div>

<!-- ظلام -->
<div class="overlay"></div>

<div class="container">
  <h1>🔥 بو قحط 🔥</h1>
  <p class="desc">منطقة حرب • إرسال رسائل ديسكورد</p>

  <!-- كلمة المرور -->
  <input id="password" type="password" placeholder="كلمة المرور">

  <input id="title" type="text" placeholder="عنوان الرسالة">
  <textarea id="message" placeholder="اكتب الرسالة هنا..."></textarea>

  <button id="sendBtn" onclick="send()">إرسال إلى الديسكورد</button>

  <p class="status" id="status"></p>
</div>

<script src="script.js"></script>
</body>
</html>
